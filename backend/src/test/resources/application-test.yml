spring:
  task:
    scheduling:
      enabled: false
  datasource:
    url: jdbc:h2:mem:jap_test;MODE=MySQL;DATABASE_TO_UPPER=false;DB_CLOSE_DELAY=-1
    username: sa
    password:
    driver-class-name: org.h2.Driver
  sql:
    init:
      mode: always
      schema-locations: classpath:test-db/schema.sql
      data-locations: classpath:test-db/data.sql
      encoding: UTF-8
      continue-on-error: false

mybatis:
  mapper-locations: classpath:mapper/*.xml
  type-aliases-package: edu.nju.jap.model.po
  configuration:
    map-underscore-to-camel-case: true

jap:
  jwt:
    secret: jap-test-secret-key-at-least-32-bytes-long!!
    expiration-hours: 24
