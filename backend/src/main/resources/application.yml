server:
  port: 8080
  tomcat:
    max-swallow-size: 50MB

spring:
  application:
    name: judgment-annotation-platform
  servlet:
    multipart:
      max-file-size: 200MB
      max-request-size: 300MB
  datasource:
    url: ${DB_URL:jdbc:mysql://localhost:3306/jap?createDatabaseIfNotExist=true&useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true&useSSL=false}
    username: ${DB_COMMON_USER}
    password: ${DB_COMMON_PWD}
    driver-class-name: com.mysql.cj.jdbc.Driver
  sql:
    init:
      mode: always
      schema-locations: classpath:db/admin.sql,classpath:db/creator.sql,classpath:db/annotator.sql,classpath:db/reviewer.sql
      data-locations: classpath:db/data.sql
      encoding: UTF-8
      continue-on-error: true

mybatis:
  mapper-locations: classpath:mapper/*.xml
  type-aliases-package: edu.nju.jap.model.po
  configuration:
    map-underscore-to-camel-case: true
