server:
  port: 8080
  tomcat:
    max-swallow-size: 50MB

spring:
  application:
    name: judgment-annotation-platform
  profiles:
    active: local
  servlet:
    multipart:
      max-file-size: 200MB
      max-request-size: 300MB
  datasource:
    url: jdbc:mysql://localhost:3306/judgment_annotation?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true&useSSL=false
    username: root
    driver-class-name: com.mysql.cj.jdbc.Driver

mybatis:
  mapper-locations: classpath:mapper/*.xml
  type-aliases-package: edu.nju.jap.model.po
  configuration:
    map-underscore-to-camel-case: true
