stages:
  - trigger

# 触发后端 pipeline
backend:
  stage: trigger
  trigger:
    include:
      - local: .gitlab/backend.yml
    strategy: depend
  rules:
    - changes:
        - backend/**/*

# 触发前端 pipeline
frontend:
  stage: trigger
  trigger:
    include:
      - local: .gitlab/frontend.yml
    strategy: depend
  rules:
    - changes:
        - frontend/**/*

# 避免只改文档、CI 配置等非前后端文件时，父 pipeline 变成空 pipeline。
noop:
  stage: trigger
  image: alpine:3.20
  rules:
    - changes:
        - backend/**/*
      when: never
    - changes:
        - frontend/**/*
      when: never
    - when: on_success
  script:
    - echo "No backend/frontend changes; skip build triggers."
